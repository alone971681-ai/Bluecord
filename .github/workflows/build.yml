name: Build Bluecord APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Bluecord
        uses: actions/checkout@v4
        with:
          repository: bluemods/Bluecord
          path: bluecord

      - name: Checkout BluecordPatcher
        uses: actions/checkout@v4
        with:
          repository: bluemods/BluecordPatcher
          path: bluecord-patcher

      - name: Patch BluecordPatcher for CI
        run: |
          sed -i 's/holder\.installApk(config\.getCompiledAlignedApkFile())\.exitOnFailure("Install")/\/\/ CI: skip ADB install/' \
            bluecord-patcher/src/main/kotlin/com/bluesmods/bluecordpatcher/Main.kt
          sed -i 's/holder\.launchApk/\/\/ holder.launchApk/' \
            bluecord-patcher/src/main/kotlin/com/bluesmods/bluecordpatcher/Main.kt
          python3 - << 'PYEOF'
          import re
          f = "bluecord-patcher/src/main/kotlin/com/bluesmods/bluecordpatcher/Main.kt"
          txt = open(f).read()
          txt = re.sub(r'\s*// Automatically start the app.*?LOG\.error\("could not extract package info.*?\}\n', '\n', txt, flags=re.DOTALL)
          open(f, "w").write(txt)
          print("CI patch applied.")
          PYEOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          echo "y" | sdkmanager "build-tools;35.0.0" "platforms;android-34" "platform-tools" 2>/dev/null
          echo "$ANDROID_HOME/build-tools/35.0.0" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Build BluecordPatcher JAR
        working-directory: bluecord-patcher
        run: gradle jar --no-daemon

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore keystore.jks \
            -alias bluecord \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Bluecord,OU=Dev,O=Bluecord,L=Unknown,ST=Unknown,C=US" \
            -storepass bluecord123 -keypass bluecord123
          echo "bluecord123" > keystore_password.txt

      - name: Create config.ini
        run: |
          mkdir -p build_output/decompiled_discord
          cat > config.ini << EOF
          [config]
          BaseDir=${{ github.workspace }}/build_output
          BaseDecompiledApk=${{ github.workspace }}/build_output/decompiled_discord

          [gradle]
          ProjectHome=${{ github.workspace }}/bluecord
          JavaHome=$JAVA_HOME

          [sign]
          SigningType = Password
          KeyStoreFile=${{ github.workspace }}/keystore.jks
          KeyStorePassword=${{ github.workspace }}/keystore_password.txt
          EOF

      - name: Build Bluecord APK
        run: echo "y" | java -jar bluecord-patcher/build/libs/BluecordPatcher.jar config.ini

      - name: Upload Bluecord APK
        uses: actions/upload-artifact@v4
        with:
          name: Bluecord-voice-fixed
          path: build_output/compiled-aligned.apk
          retention-days: 7
